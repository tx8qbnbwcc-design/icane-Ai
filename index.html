*{

#followLock{

font-family:'Poppins',sans-serif;

background:
linear-gradient(
135deg,
#000000,
#020617,
#07111f,
#000000
);

}

/* BACKGROUND */

.bg{

position:absolute;

inset:0;

background-image:
linear-gradient(
rgba(255,255,255,0.03) 1px,
transparent 1px
),
linear-gradient(
90deg,
rgba(255,255,255,0.03) 1px,
transparent 1px
);

background-size:40px 40px;

mask-image:
radial-gradient(circle,#fff,transparent 80%);

}

/* NEON */

.neon{

position:absolute;

border-radius:50%;

filter:blur(120px);

animation:float 8s infinite ease-in-out;

}

.neon1{

width:300px;
height:300px;

background:#00ffee55;

top:-100px;
left:-80px;

}

.neon2{

width:350px;
height:350px;

background:#ff00cc44;

bottom:-100px;
right:-100px;

animation-delay:2s;

}

@keyframes float{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-30px);
}

100%{
transform:translateY(0px);
}

}

/* BOX */

.lockBox{

position:relative;

width:92%;

max-width:430px;

padding:45px 25px;

border-radius:35px;

background:
rgba(10,15,25,0.92);

border:1px solid #ffffff12;

backdrop-filter:blur(25px);

box-shadow:
0 0 80px #00ffee22,
0 0 140px #ff00cc22;

overflow:hidden;

text-align:center;

animation:
floatCard 4s infinite ease-in-out;

}

@keyframes floatCard{

0%{
transform:translateY(0px);
}

50%{
transform:translateY(-10px);
}

100%{
transform:translateY(0px);
}

}

/* LIVE */

.live{

position:absolute;

top:18px;

width:12px;
height:12px;

border-radius:50%;

background:#00ff88;

box-shadow:
0 0 20px #00ff88;

animation:pulse 1.5s infinite;

}

@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.3);
}

100%{
transform:scale(1);
}

}

/* BADGE */

.badge{

display:inline-block;

<script>

let clicked=false;

document
.getElementById("followBtn")
.addEventListener("click",function(){

clicked=true;

const unlockBtn=
document.getElementById("unlockBtn");

unlockBtn.innerHTML=
"⏳ FOLLOW ШАЛГАЖ БАЙНА...";

setTimeout(()=>{

unlockBtn.disabled=false;

unlockBtn.classList.add("active");

unlockBtn.innerHTML=
"⚡ SITE НЭЭХ";

},5000);

});

document
.getElementById("unlockBtn")
.addEventListener("click",function(){

if(clicked){

localStorage.setItem(
"icane_unlock",
"yes"
);

document
.getElementById("followLock")
.style.display="none";

}

});

window.onload=function(){

if(
localStorage.getItem(
"icane_unlock"
)==="yes"
){

document
.getElementById("followLock")
.style.display="none";

}

};

</script>
